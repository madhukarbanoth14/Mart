name: Flashmart
options:
  bundleIdPrefix: com.knsrmart
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    INFOPLIST_KEY_CFBundleDisplayName: FlashMart
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_FILE: Flashmart/Info.plist
  configs:
    Debug:
      MART_API_BASE_URL: http://127.0.0.1:3005
    Release:
      MART_API_BASE_URL: https://mart-api-95628498734.asia-south1.run.app
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config.xcconfig
  Release: Config.Release.xcconfig
targets:
  Flashmart:
    type: application
    platform: iOS
    sources:
      - path: Flashmart
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.knsrmart.flashmart
        PRODUCT_NAME: Flashmart
        SWIFT_EMIT_LOC_STRINGS: YES
    configFiles:
      Debug: Config.xcconfig
      Release: Config.Release.xcconfig
