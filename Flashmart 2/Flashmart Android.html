<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashMart — Android Material 3 Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app/theme.css" />
  <style>
    html, body { height: 100%; margin: 0; background: #eef0f4; }
    #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail" data-bg-color="#15924b">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#15924b"/>
      <rect x="460" y="200" width="280" height="400" rx="40" fill="#0b6332"/>
      <path d="M636 280 L556 400 H616 L606 480 L696 360 H636 L646 280 Z" fill="#e3a008"/>
      <rect x="760" y="200" width="280" height="400" rx="40" fill="#0f7d3f"/>
      <path d="M836 280 L756 400 H816 L806 480 L896 360 H836 L846 280 Z" fill="#fff" opacity=".5"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- shared data -->
  <script src="app/data.js"></script>

  <!-- frames -->
  <script type="text/babel" src="frames/android-frame.jsx"></script>
  <script type="text/babel" src="frames/design-canvas.jsx"></script>

  <!-- shared design system primitives -->
  <script type="text/babel" src="app/ui.jsx"></script>
  <script type="text/babel" src="app/ui2.jsx"></script>
  <script type="text/babel" src="app/shell.jsx"></script>

  <!-- Material 3 kit -->
  <script type="text/babel" src="android/m3.jsx"></script>

  <!-- Auth screens -->
  <script type="text/babel" src="android/auth.jsx"></script>
  <script type="text/babel" src="android/flow.jsx"></script>

  <!-- Shopkeeper screens -->
  <script type="text/babel" src="android/screens_shopkeeper.jsx"></script>
  <script type="text/babel" src="android/screens_shopkeeper2.jsx"></script>
  <script type="text/babel" src="android/screens_shopkeeper3.jsx"></script>

  <!-- Dealer screens -->
  <script type="text/babel" src="android/screens_dealer.jsx"></script>

  <!-- Employee screens -->
  <script type="text/babel" src="android/screens_employee.jsx"></script>

  <!-- System states + shared modules -->
  <script type="text/babel" src="android/screens_states.jsx"></script>

  <!-- Wallet + Admin -->
  <script type="text/babel" src="android/screens_wallet_admin.jsx"></script>

  <!-- Gallery (mounts app) -->
  <script type="text/babel" src="android/gallery.jsx"></script>
</body>
</html>
